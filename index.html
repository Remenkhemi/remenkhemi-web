<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Remenkhemi</title>
    <meta
      name="description"
      content="Remenkhemi — a free app for learning the Coptic language. All learning data stays on your device."
    />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #1a1a1a;
        --muted: #5b5b5b;
        --accent: #7a5cff;
        --rule: #e6e6e6;
        --card: #f7f7f9;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #14141a;
          --fg: #ececf1;
          --muted: #a2a2ad;
          --accent: #a48cff;
          --rule: #2a2a34;
          --card: #1d1d26;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--fg);
        font: 17px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial,
          sans-serif;
        -webkit-text-size-adjust: 100%;
      }
      main {
        max-width: 34rem;
        padding: 2.5rem 1.5rem;
        text-align: center;
      }
      .wordmark {
        font-size: 2.6rem;
        font-weight: 700;
        letter-spacing: -0.01em;
        margin: 0;
      }
      .coptic {
        color: var(--accent);
        font-size: 1.6rem;
        margin: 0.4rem 0 0;
      }
      .lede {
        color: var(--muted);
        margin: 1.25rem auto 2rem;
        max-width: 26rem;
      }
      nav {
        display: flex;
        gap: 0.75rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      a.btn {
        display: inline-block;
        text-decoration: none;
        color: var(--fg);
        background: var(--card);
        border: 1px solid var(--rule);
        border-radius: 0.7rem;
        padding: 0.6rem 1.1rem;
        font-size: 0.98rem;
      }
      a.btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      footer {
        color: var(--muted);
        font-size: 0.9rem;
        margin-top: 2.5rem;
      }
      footer a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1 class="wordmark">Remenkhemi</h1>
      <p class="coptic" lang="cop">ⲣⲉⲙⲛ̀ⲭⲏⲙⲓ</p>
      <p class="lede">
        A free app for learning the Coptic language. Everything you learn stays on your device — no
        accounts, no tracking.
      </p>
      <nav>
        <a class="btn" href="/privacy">Privacy Policy</a>
        <a class="btn" href="/terms">Terms of Service</a>
      </nav>
      <footer>
        Questions? <a href="mailto:contact@remenkhemi.com">contact@remenkhemi.com</a>
      </footer>
    </main>
  </body>
</html>
